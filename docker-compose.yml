services:
  postgres:
    image: postgres:16
    container_name: egyptlawyers-postgres
    environment:
      POSTGRES_DB: egyptlawyers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - egyptlawyers_pgdata:/var/lib/postgresql/data

volumes:
  egyptlawyers_pgdata:

